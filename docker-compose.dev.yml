name: booster-break-dev

services:
  postgres:
    image: postgres:17-alpine
    env_file:
      - ${BOOSTER_BREAK_ENV_FILE:-apps/api/.env.local}
    ports:
      - '5232:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
