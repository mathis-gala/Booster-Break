services:
  caddy:
    image: caddy:2.11.4-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
    restart: unless-stopped
    env_file:
      - ${BOOSTER_BREAK_ENV_FILE:-booster-break.env}
    depends_on:
      - web
      - api
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      - caddy-data:/data
      - caddy-config:/config

  web:
    image: ghcr.io/mathis-gala/booster-break/web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    expose:
      - '80'

  postgres:
    image: postgres:17.10-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
    restart: unless-stopped
    env_file:
      - ${BOOSTER_BREAK_ENV_FILE:-booster-break.env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    image: ghcr.io/mathis-gala/booster-break/api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - ${BOOSTER_BREAK_ENV_FILE:-booster-break.env}
    environment:
      PORT: 3100
      HOST: 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - '3100'

volumes:
  caddy-data:
  caddy-config:
  postgres-data:
