services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - ${BOOSTER_BREAK_ENV_FILE:-booster-break.env}
    depends_on:
      - api
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - ${BOOSTER_BREAK_ENV_FILE:-booster-break.env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    image: ghcr.io/mathis-gala/booster-break/api:latest
    restart: unless-stopped
    env_file:
      - ${BOOSTER_BREAK_ENV_FILE:-booster-break.env}
    environment:
      PORT: 3100
      HOST: 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - '3100'

volumes:
  caddy-data:
  caddy-config:
  postgres-data:
