services:
  postgres:
    image: postgres:17.10-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
    env_file:
      - ${BOOSTER_BREAK_ENV_FILE:-apps/api/.env.local}
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ${BOOSTER_BREAK_ENV_FILE:-apps/api/.env.local}
    environment:
      PORT: 3100
      HOST: 0.0.0.0
      API_ORIGIN: http://127.0.0.1:3100
      WEB_ORIGIN: http://127.0.0.1:5173
    ports:
      - '127.0.0.1:3100:3100'

volumes:
  postgres-data:
